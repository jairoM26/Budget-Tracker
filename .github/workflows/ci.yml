name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: budget
          POSTGRES_PASSWORD: budget_local
          POSTGRES_DB: budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Type check
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Run migrations on test database
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://budget:budget_local@localhost:5432/budget_test

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run tests
        run: npm run test --workspace=apps/api
        env:
          DATABASE_URL: postgresql://budget:budget_local@localhost:5432/budget_test
          TEST_DATABASE_URL: postgresql://budget:budget_local@localhost:5432/budget_test
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_SECRET: ci-refresh-secret-do-not-use-in-production
          NODE_ENV: test
